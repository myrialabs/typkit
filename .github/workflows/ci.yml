name: CI & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify build output
        run: |
          for f in dist/index.js dist/index.d.ts dist/middleware/index.js; do
            if [ ! -f "$f" ]; then echo "Build failed — missing $f"; exit 1; fi
          done
          echo "dist artifacts present."

  node-matrix:
    name: Smoke test on Node ${{ matrix.node }}
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install & build
        run: bun install && bun run build

      - name: Import & validate under Node
        run: |
          node --input-type=module -e "
            import { t } from './dist/index.js';
            const User = t.object({
              name: t.string({ minLength: 2 }),
              age: t.int({ min: 0 }),
              email: t.email(),
            });
            const ok = User.check({ name: 'ab', age: 3, email: 'a@b.co' });
            const bad = !User.check({ name: 'a', age: -1, email: 'x' });
            const r = User.parse({ name: 'a', age: 3, email: 'a@b.co' }, { abortEarly: false });
            const path = r.issues && r.issues[0].path.join('/') === 'name';
            const js = User.toJsonSchema().type === 'object';
            if (!(ok && bad && path && js)) { console.error('failed', { ok, bad, path, js }); process.exit(1); }
            console.log('Node ${{ matrix.node }} validate OK');
          "

  pack:
    name: npm pack smoke test
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Build & pack
        run: |
          bun install
          bun run build
          npm pack
          tar -tf myrialabs-typkit-*.tgz | grep -E 'package/dist/index.js' || (echo "tarball missing dist/index.js" && exit 1)
          tar -tf myrialabs-typkit-*.tgz | grep -E 'package/dist/index.d.ts' || (echo "tarball missing dist/index.d.ts" && exit 1)
          echo "Tarball contents verified."

  publish:
    name: Publish & Release
    needs: [ci, node-matrix, pack]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install
        run: bun install

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
